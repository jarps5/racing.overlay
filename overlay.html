<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overlay — Racing Overlay</title>
<link rel="stylesheet" href="css/style.css">
<style>
  html, body { background: transparent; }
  #setupPanel { max-width: 480px; margin: 40px auto; }
  #dashboard { position: fixed; inset: 0; }
</style>
</head>
<body>
  <div id="setupPanel" class="wrap">
    <div class="eyebrow">Overlay setup</div>
    <h1 style="font-size:28px;">Connect to a session</h1>
    <div class="panel">
      <label for="roomInput">Room code</label>
      <input type="text" id="roomInput" placeholder="e.g. rally-2026">
      <div style="height:14px;"></div>
      <button id="connectBtn">Connect</button>
      <p class="footer-note">
        Once connected, add this exact page URL as a Browser Source in OBS
        (background is already transparent). You can redesign the layout
        from here, your phone, or any browser — edits sync live to OBS
        through the room, no need to touch OBS itself.
      </p>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/room.js"></script>
<script src="js/widgets.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/dashboard-toolbar.js"></script>
<script src="js/overlay.js"></script>
</body>
</html>
